name: GitHub → Discord Notifications

on:
  push:
  pull_request:
  issues:
  release:
  create:
  delete:
  fork:
  watch:

jobs:
  discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          USER: ${{ github.actor }}
          URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          MESSAGE=$(cat <<EOF
          {
            "embeds": [{
              "title": "GitHub Event: $EVENT",
              "url": "$URL",
              "color": 5814783,
              "author": {
                "name": "$USER",
                "url": "https://github.com/$USER"
              },
              "fields": [
                {
                  "name": "Repository",
                  "value": "$REPO",
                  "inline": true
                },
                {
                  "name": "Event",
                  "value": "$EVENT",
                  "inline": true
                }
              ],
              "footer": {
                "text": "GitHub → Discord Integration"
              },
              "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            }]
          }
          EOF
          )

          curl -H "Content-Type: application/json" \
               -d "$MESSAGE" \
               $WEBHOOK
